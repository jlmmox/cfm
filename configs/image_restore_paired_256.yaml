# Ready-to-run config for paired clean/degraded folders at 256px.
# 目录结构:
#   <root>/train/{degraded,clean}
#   <root>/val/{degraded,clean}   # 可选
# 用法: 修改 data.params.root 后执行:
#   python train.py --config configs/image_restore_paired_256.yaml --name your_run

model:                                         # 模型配置
  target: cfm_inference.trainer.TrainerFMBoost # 训练器类路径
  params:
    low_res_size: 256                          # 输入低质分辨率（需被8整除）
    high_res_size: 256                         # 高质输出分辨率（还原同分辨率）
    upsampling_mode: identity                  # 低质 latent 上采样模式（还原任务恒等）
    upsampling_mode_context: identity          # 拼接条件上采样模式
    upsampling_mode_ca_context: identity       # 交叉注意力条件上采样模式
    start_from_noise: False                    # 是否从纯噪声起步
    noising_step: 400                          # 线性噪声步数，-1 关闭
    concat_context: True                       # 是否拼接低质 latent 作为条件
    ca_context: False                          # 是否使用交叉注意力条件
    fm_cfg:                                    # 流匹配主网络
      target: cfm_inference.flow.FlowModel     # FlowModel 类路径
      params:
        schedule: linear                       # 噪声/时间调度策略
        net_cfg:                               # U-Net 结构
          target: cfm_inference.models.unet.model.EfficientUNet
          params:
            in_channels: 8                     # 输入通道（条件拼接后）
            model_channels: 128                # 基础通道宽度
            out_channels: 4                    # 输出通道（latent）
            num_res_blocks: 3                  # 每层 ResBlock 数量
            channel_mult: [1, 2, 4, 8]         # 各层通道倍增系数
            attention_resolutions: [8, 16]     # 添加注意力的分辨率
            dropout: 0.0                       # Dropout 比例
            conv_resample: True                # 是否用卷积重采样
            dim_head: 64                       # 注意力 head 维度
            num_heads: 4                       # 注意力 head 数
            use_linear_attn: False             # 是否用线性注意力
            use_scale_shift_norm: True         # 是否用 scale-shift 归一化
            pool_factor: -1                    # 下采样池化因子（-1 关闭）
    scale_factor: 0.18215                      # SD VAE  latent 缩放因子
    first_stage_cfg:                           # 第一阶段编码器 (VAE)
      target: cfm_inference.kl_autoencoder.AutoencoderKL
      params:
        ckpt_path: checkpoints/sd_ae.ckpt      # 预训练 VAE 权重路径
    lr: 3e-5                                   # 学习率
    weight_decay: 0.0                          # 权重衰减
    ema_rate: 0.999                            # EMA 衰减率
    ema_update_every: 1                        # EMA 更新步频
    ema_update_after_step: 1000                # EMA 延迟启用步数
    use_ema_for_sampling: True                 # 推理是否使用 EMA 模型
    metric_tracker_cfg:                        # 指标追踪配置
      target: cfm_inference.metrics.ImageMetricTracker
      params:
        num_crops: 4                           # FID 裁剪次数
        crop_size: 512                         # FID 裁剪尺寸
    lr_scheduler_cfg:                          # 学习率调度器
      target: cfm_inference.lr_schedulers.get_constant_schedule_with_warmup
      params:
        num_warmup_steps: 1000                 # 预热步数
    log_grad_norm: True                        # 是否记录梯度范数

data:                                          # 数据模块配置
  name: PairedFolder256                        # 数据集名称标签
  target: cfm_inference.dataloader.PairedFolderDataModule # 数据模块类路径
  params:
    root: C:/Users/moxt/OneDrive/Desktop/cfm_inference/cfm_test  # 数据根目录
    batch_size: 2                                # 训练批大小
    val_batch_size: 2                            # 验证批大小
    image_size: 256                              # 训练/验证尺寸（短边缩放+裁剪）
    num_workers: 4                               # DataLoader worker 数
    random_flip: true                            # 训练是否随机水平翻转

train:                                         # 训练控制项
  checkpoint_callback_params:
    every_n_train_steps: 10000                  # 每隔多少步保存一次
    save_top_k: -1                              # 保存全部 checkpoint
    verbose: True                               # 打印保存日志
    save_last: True                             # 额外保存 last.ckpt
    auto_insert_metric_name: False              # 不在文件名插入指标
  trainer_params:
    max_epochs: -1                              # 训练轮数（-1 表示不限步）
    num_sanity_val_steps: 0                     # 启动前验证步数
    accumulate_grad_batches: 1                  # 梯度累计步数
    log_every_n_steps: 50                       # 日志打印步频
    limit_val_batches: 1.0                      # 验证集比例（1.0 全量，0 关闭）
    val_check_interval: 50                      # 验证频率（步），需 ≤ 训练步数
    precision: bf16-mixed                       # 混合精度设置
  callbacks:
    - target: pytorch_lightning.callbacks.LearningRateMonitor # 监控学习率
      params:
        logging_interval: 'step'                # 每步记录学习率
